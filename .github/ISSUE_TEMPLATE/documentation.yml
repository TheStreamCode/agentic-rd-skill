name: Documentation
description: Report unclear or missing documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      description: What is unclear or missing?
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: Relevant file
      placeholder: README.md, SKILL.md, references/workflow.md
    validations:
      required: false
