name: Bug report
description: Report a problem with the skill package or scaffold script.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Include `npm test` output if relevant.
    validations:
      required: false
